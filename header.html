<style>
  /* Premium Nav link underline animation */
  .navbar-nav .nav-link {
    position: relative !important;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    padding: 0.6rem 1.25rem !important;
    margin: 0 0.1rem;
    font-size: 0.9rem !important;
    letter-spacing: 0.5px;
    border-radius: 8px !important;
  }
  .navbar-nav .nav-link::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateX(-50%);
    border-radius: 2px;
  }
  .navbar-nav .nav-link:hover {
    color: #fff !important;
    background: rgba(255, 255, 255, 0.04) !important;
  }
  .navbar-nav .nav-link:hover::after,
  .navbar-nav .nav-link.active::after {
    width: 50%;
  }
  
  /* Brand Logo Hover Glow */
  .navbar-brand h2 {
    transition: transform 0.3s ease;
  }
  .navbar-brand:hover h2 {
    transform: scale(1.02);
  }
  .brand-dot {
    display: inline-block;
    color: var(--secondary-color);
    animation: brandGlow 2s ease-in-out infinite alternate;
  }
  @keyframes brandGlow {
    0% { text-shadow: 0 0 4px rgba(14, 165, 233, 0.2); }
    100% { text-shadow: 0 0 12px rgba(14, 165, 233, 0.8), 0 0 20px rgba(14, 165, 233, 0.4); }
  }
</style>

<!-- header section start -->
<div class="header_bg">
  <div class="container-fluid px-lg-5">
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-0">
      <a class="navbar-brand" href="index.html">
        <h2 style="font-weight: 800; letter-spacing: -1px; margin: 0; color: #fff; font-size: 1.5rem;">
          <span class="gradient-text">Dinkar</span><span style="color: rgba(255,255,255,0.85);"> Prasad</span><span class="brand-dot">.</span>
          <span style="display: block; font-size: 0.55rem; font-weight: 500; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px;">Java Backend Developer</span>
        </h2>
      </a>

      <button
        class="navbar-toggler py-2"
        type="button"
        data-toggle="collapse"
        data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent"
        aria-expanded="false"
        aria-label="Toggle navigation"
        style="border: 1px solid var(--glass-border); border-radius: 12px; background: rgba(255, 255, 255, 0.05);"
      >
        <i class="fa fa-bars" style="color: #fff; font-size: 20px;"></i>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto align-items-center">
          <li class="nav-item mx-lg-1">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item mx-lg-1">
            <a class="nav-link" href="about.html">About</a>
          </li>
          <li class="nav-item mx-lg-1">
            <a class="nav-link" href="skills.html">Skills</a>
          </li>
          <li class="nav-item mx-lg-1">
            <a class="nav-link" href="portfolio.html">Portfolio</a>
          </li>
          <li class="nav-item mx-lg-1">
            <a class="nav-link" href="service.html">Services</a>
          </li>
          <li class="nav-item mx-lg-1 ml-lg-4">
            <a class="nav-link premium-btn px-4" href="contact.html" style="color: white !important;">Let's Talk</a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Active link highlight
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    const navLinks = document.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
        link.style.setProperty('color', 'var(--primary-color)', 'important');
      }
    });

    // Sticky navbar scroll effect
    window.addEventListener('scroll', function () {
      const header = document.querySelector('.header_bg');
      if (window.scrollY > 50) {
        header.style.background = 'rgba(2, 6, 23, 0.92)';
        header.style.backdropFilter = 'blur(16px)';
        header.style.boxShadow = '0 4px 30px rgba(0,0,0,0.4)';
        header.style.borderBottom = '1px solid var(--glass-border)';
      } else {
        header.style.background = '';
        header.style.backdropFilter = '';
        header.style.boxShadow = 'none';
        header.style.borderBottom = '';
      }
    });
  });
</script>
<!-- header section end -->
