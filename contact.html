<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- basic -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- mobile metas -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
    <!-- site metas -->
    <title>Contact | Dinkar</title>
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <!-- bootstrap css -->
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css" />
    <!-- style css -->
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <!-- Modern 3D Theme -->
    <link rel="stylesheet" type="text/css" href="css/modern-3d.css" />
    <!-- Responsive-->
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- fevicon -->
    <link rel="icon" href="images/d.png" type="image/gif" />
    <!-- Scrollbar Custom CSS -->
    <link rel="stylesheet" href="css/jquery.mCustomScrollbar.min.css" />
    <!-- Tweaks for older IEs-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome css -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      /* Full-page overlay */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      /* Animation to rotate the D */
      @keyframes rotateD {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(180deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Animation to scale the D */
      @keyframes scaleD {
        0%,
        100% {
          transform: scale(2);
        }
        50% {
          transform: scale(3.2);
        }
      }
      .servicest {
        background-color: #ecf0f1;
        background-image: url(images/i.jpg);
        padding: 50px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      /* Hide the loader after page has loaded */
      body.loaded .loading-overlay {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Custom Interactive Cursor -->
    <div class="custom-cursor" id="cursor"></div>

    <!-- Loading overlay with the animated "D" logo -->
    <div class="loading-overlay">
      <div class="d-logo">DK</div>
    </div>
    <!-- Header will be loaded here -->
    <div id="header"></div>

    <!-- contact section start -->
    <div class="contact_section layout_padding">
      <div class="container">
        <div class="row">
          <section class="container glass-card" style="margin-top: 100px;">
            <div class="col-sm-12">
              <h1 class="modern-title" style="margin: 0; text-align: center;">
                My <span style="color: var(--text-light);">Contact</span>
              </h1>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div class="layout_padding">
      <div class="container text-center mb-5 animate-up">
        <h1 class="modern-title" style="font-size: 3.5rem;">Get in <span class="gradient-text">Touch</span></h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem;">Let's discuss your next big project.</p>
      </div>

      <div class="container animate-up" style="animation-delay: 0.2s;">
        <div class="row g-5">
          <div class="col-lg-5">
            <div class="glass-card h-100 p-4">
              <h3 class="mb-4" style="color: #fff; font-weight: 700;">Find Me</h3>
              <div class="map-container mb-4" style="border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border);">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d116104.97200408726!2d80.72064521073088!3d24.579518302882594!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39847f12a0d55141%3A0xa6208334386e35e2!2sSatna%2C%20Madhya%20Pradesh!5e0!3m2!1sen!2sin!4v1739955464305!5m2!1sen!2sin"
                  width="100%"
                  height="300"
                  style="border: 0"
                  loading="lazy"
                ></iframe>
              </div>
              <div class="contact-info">
                <div class="d-flex align-items-center mb-3">
                  <i class="fa fa-map-marker mr-3" style="color: var(--primary-color);"></i>
                  <p style="color: var(--text-secondary); margin: 0;">Satna, Madhya Pradesh, India</p>
                </div>
                <div class="d-flex align-items-center mb-3">
                  <i class="fa fa-envelope mr-3" style="color: var(--secondary-color);"></i>
                  <p style="color: var(--text-secondary); margin: 0;">kumar.dinkar.prasad@gmail.com</p>
                </div>
                <div class="d-flex align-items-center">
                  <i class="fa fa-phone mr-3" style="color: var(--accent-color);"></i>
                  <p style="color: var(--text-secondary); margin: 0;">+91 70000 45867</p>
                </div>
              </div>
            </div>
          </div>
          
          <div class="col-lg-7">
            <div class="glass-card p-4">
              <h3 class="mb-4" style="color: #fff; font-weight: 700;">Send a Message</h3>
              <form action="https://formspree.io/f/xqapgegw" method="POST">
                <div class="row">
                  <div class="col-md-6 mb-4">
                    <input type="text" name="FirstName" class="mail_text" placeholder="First Name" required style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; padding: 15px;">
                  </div>
                  <div class="col-md-6 mb-4">
                    <input type="text" name="LastName" class="mail_text" placeholder="Last Name" required style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; padding: 15px;">
                  </div>
                  <div class="col-md-12 mb-4">
                    <input type="email" name="Email" class="mail_text" placeholder="Email Address" required style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; padding: 15px;">
                  </div>
                  <div class="col-md-12 mb-4">
                    <textarea name="Message" class="massage-bt" placeholder="Project Details" rows="5" required style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; padding: 15px;"></textarea>
                  </div>
                  <div class="col-md-12">
                    <button type="submit" class="premium-btn w-100">Send Now</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- contact section end -->

    <!-- Showcase Section Bridge -->
    <div class="layout_padding pt-0">
      <div class="container mobile-px-0">
        <div class="glass-card text-center py-5" style="background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(99, 102, 241, 0.1)); border-color: rgba(99, 102, 241, 0.2);">
          <h2 class="modern-title" style="font-size: 2.2rem; margin-bottom: 2rem;">Want to see my <span class="gradient-text">Work?</span></h2>
          <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a href="portfolio.html" class="premium-btn">Browse Portfolio</a>
            <a href="index.html" class="premium-btn-outline ml-3">Back to Home</a>
          </div>
        </div>
      </div>
    </div>
    <!-- project box section end -->
    <!-- Header will be loaded here -->
    <div id="header"></div>

    <!-- Footer will be loaded here -->
    <div id="footer"></div>

    <!-- Script to import header and footer -->
    <script>
      // Load header
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => (document.getElementById("header").innerHTML = data));

      // Load footer
      fetch("footer.html")
        .then((res) => res.text())
        .then((data) => (document.getElementById("footer").innerHTML = data));
    </script>
    <!-- copyright section end -->
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

    <!-- Modern Theme Logic -->
    <script src="js/modern-theme.js"></script>

    <!-- Javascript files-->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
